equipment:
  - fırın
ingredientGroups:
  - label: Hamur için
    items:
      - name: Hazır yufka veya baklava yufkası
        amount: 500
        unit: gr
        optional: false
      - name: Tereyağı (eritilmiş)
        amount: 200
        unit: gr
        optional: false
  - label: İç için
