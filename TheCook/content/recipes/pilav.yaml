servings: 4
coverImage: null
allergens:
  - dairy
equipment:
  - tencere
ingredientGroups:
  - label: null
    items:
      - name: Pirinç
        amount: 2
        unit: su bardağı
        optional: false
      - name: Tereyağı
        amount: 2
